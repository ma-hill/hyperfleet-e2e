adapterConfig:
  create: true
  files:
    adapter-config.yaml: cl-maestro/adapter-config.yaml
  log:
    level: debug

adapterTaskConfig:
  create: true
  files:
    task-config.yaml: cl-maestro/adapter-task-config.yaml

broker:
  create: true
  googlepubsub:
    project_id: CHANGE_ME
    subscription_id: CHANGE_ME
    topic: CHANGE_ME
    dead_letter_topic: CHANGE_ME

image:
  registry: ${IMAGE_REGISTRY}
  repository: ${ADAPTER_IMAGE_REPO}
  pullPolicy: Always
  tag: ${ADAPTER_IMAGE_TAG}

rbac:
   resources:
     - namespaces
     - configmaps
     - configmaps/status
