adapter:
  name: cl-crash

debug_config: false
log:
  level: debug

clients:
  hyperfleet_api:
    base_url: CHANGE_ME
    version: v1
    timeout: 2s
    retry_attempts: 3
    retry_backoff: exponential

  broker:
    subscription_id: CHANGE_ME
    topic: CHANGE_ME

  kubernetes:
    api_version: "v1"
